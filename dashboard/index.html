<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opportunity Radar</title>
    <style>
        :root {
            --bg: #070707;
            --bg-elevated: #0f1011;
            --panel: rgba(20, 21, 22, 0.96);
            --panel-soft: rgba(29, 30, 32, 0.96);
            --border: rgba(255, 255, 255, 0.07);
            --text: #d4d6d8;
            --text-strong: #eceef0;
            --muted: #8a8f96;
            --green: #89b89a;
            --yellow: #b8aa74;
            --gray: #8b8b8b;
            --blue: #6a8fb4;
            --shadow: 0 22px 60px rgba(0, 0, 0, 0.36);
            --shadow-hover: 0 32px 84px rgba(0, 0, 0, 0.46);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(124, 142, 163, 0.14), transparent 24%),
                linear-gradient(180deg, #0b0c0d 0%, #050505 52%, #020202 100%);
        }

        .shell {
            width: min(1180px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 40px 0 80px;
        }

        .hero {
            text-align: center;
            padding: 28px 16px 18px;
        }

        .eyebrow {
            margin: 0 0 14px;
            color: #6e7379;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            font-size: 0.74rem;
            font-weight: 700;
        }

        h1 {
            margin: 0;
            color: var(--text-strong);
            font-size: clamp(2.8rem, 4.8vw, 5rem);
            font-weight: 650;
            letter-spacing: -0.05em;
            line-height: 0.95;
        }

        .subtext {
            max-width: 720px;
            margin: 18px auto 0;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.8;
        }

        .toolbar {
            display: grid;
            grid-template-columns: 1.2fr 1fr auto;
            gap: 16px;
            margin: 22px 0 18px;
            padding: 18px;
            border: 1px solid var(--border);
            border-radius: 26px;
            background: linear-gradient(180deg, rgba(20, 21, 22, 0.96), rgba(15, 16, 17, 0.96));
            box-shadow: var(--shadow);
        }

        .statusbar {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            padding: 16px 18px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.02);
            color: var(--muted);
            font-size: 0.92rem;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .control-group {
            display: grid;
            gap: 7px;
        }

        .control-label {
            color: #7f858c;
            font-size: 0.76rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-weight: 700;
        }

        select,
        button {
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            border-radius: 14px;
            font-size: 0.95rem;
        }

        select {
            width: 100%;
            padding: 12px 14px;
            appearance: none;
            background:
                linear-gradient(180deg, rgba(26, 27, 29, 0.98), rgba(14, 15, 16, 0.98));
            color: var(--text-strong);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
            transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
        }

        select:hover {
            border-color: rgba(255, 255, 255, 0.14);
            background: linear-gradient(180deg, rgba(31, 32, 34, 0.98), rgba(17, 18, 20, 0.98));
        }

        select:focus {
            outline: none;
            border-color: rgba(106, 143, 180, 0.5);
            box-shadow: 0 0 0 3px rgba(106, 143, 180, 0.12);
        }

        select option {
            background: #111214;
            color: #e4e6e8;
        }

        .actions {
            display: flex;
            gap: 12px;
            align-items: end;
            justify-content: flex-end;
        }

        .toggle {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            font-size: 0.92rem;
            transition: border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
        }

        .toggle:hover {
            border-color: rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.06);
        }

        .toggle input {
            accent-color: #96a5b4;
        }

        .refresh-btn {
            padding: 12px 16px;
            cursor: pointer;
            transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
        }

        .refresh-btn:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.16);
        }

        .filter-summary {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin: 0 0 24px;
            padding: 0 4px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .filter-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            border-radius: 999px;
            border: 1px solid rgba(106, 143, 180, 0.28);
            background: rgba(106, 143, 180, 0.1);
            color: #c7d5e3;
            font-size: 0.88rem;
        }

        .groups {
            display: grid;
            gap: 26px;
            margin-top: 24px;
        }

        .group {
            display: grid;
            gap: 16px;
        }

        .group-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .group-title {
            margin: 0;
            font-size: 1.18rem;
            font-weight: 650;
            letter-spacing: -0.02em;
        }

        .group-subtitle {
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .group-count {
            color: var(--muted);
            font-size: 0.88rem;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
            gap: 18px;
        }

        .card {
            opacity: 0;
            transform: translateY(14px);
            animation: fadeIn 420ms ease forwards;
            position: relative;
            overflow: hidden;
            border-radius: var(--radius);
            background: linear-gradient(180deg, rgba(33, 34, 36, 0.96), rgba(20, 21, 22, 0.96));
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: 22px 22px 18px;
            transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(255, 255, 255, 0.13);
        }

        .card.top-signal {
            border-color: rgba(184, 170, 116, 0.24);
            box-shadow:
                0 0 0 1px rgba(184, 170, 116, 0.12),
                0 24px 70px rgba(0, 0, 0, 0.42);
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--gray);
            opacity: 0.9;
        }

        .card.strong::before {
            background: var(--green);
        }

        .card.moderate::before {
            background: var(--yellow);
        }

        .card.weak::before {
            background: var(--gray);
        }

        .card.has-zscore::after {
            content: "";
            position: absolute;
            top: 12px;
            right: 12px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--blue);
            box-shadow: 0 0 0 6px rgba(106, 143, 180, 0.12);
        }

        .card-head {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .stock {
            margin: 0;
            color: var(--text-strong);
            font-size: 1.36rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .card-head-left {
            display: grid;
            gap: 10px;
            min-width: 0;
        }

        .card-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge.top {
            color: #ddd1aa;
            border-color: rgba(184, 170, 116, 0.24);
            background: rgba(184, 170, 116, 0.08);
        }

        .score-stack {
            display: grid;
            gap: 8px;
            justify-items: end;
        }

        .score-chip {
            flex-shrink: 0;
            min-width: 112px;
            text-align: center;
            padding: 9px 12px;
            border-radius: 999px;
            color: var(--text-strong);
            font-weight: 600;
            font-size: 0.86rem;
            letter-spacing: 0.01em;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
        }

        .score-chip.strong {
            background: rgba(137, 184, 154, 0.12);
            border-color: rgba(137, 184, 154, 0.24);
            color: #d8e5db;
        }

        .score-chip.moderate {
            background: rgba(184, 170, 116, 0.12);
            border-color: rgba(184, 170, 116, 0.22);
            color: #e4dcc3;
        }

        .score-chip.weak {
            background: rgba(139, 139, 139, 0.11);
            border-color: rgba(139, 139, 139, 0.2);
            color: #d0d0d0;
        }

        .score-value {
            color: var(--muted);
            font-size: 0.84rem;
        }

        .meta {
            display: grid;
            gap: 14px;
            margin-bottom: 16px;
        }

        .meta-row {
            display: grid;
            gap: 6px;
            font-size: 0.94rem;
            line-height: 1.5;
            color: var(--muted);
        }

        .meta-label {
            color: #7d8389;
            font-size: 0.76rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 700;
        }

        .meta-value {
            color: #cbd0d4;
            min-width: 0;
            word-break: break-word;
        }

        .what-happened {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .signal-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid rgba(255, 255, 255, 0.07);
            color: #d0d4d8;
            white-space: nowrap;
        }

        .signal-tag.zscore {
            border-color: rgba(106, 143, 180, 0.24);
            background: rgba(106, 143, 180, 0.08);
            color: #c9d9e7;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
            margin: 14px 0 14px;
        }

        .explanation {
            margin: 0;
            color: #b7babd;
            line-height: 1.72;
            font-size: 0.95rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            max-height: 3.5em;
            transition: max-height 220ms ease;
        }

        .card.expanded .explanation {
            display: block;
            overflow: visible;
            max-height: 220px;
        }

        .explanation::first-line {
            color: #d9dde0;
            font-weight: 600;
        }

        .insight-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            color: #939aa1;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 700;
        }

        .read-more {
            margin-top: 12px;
            padding: 0;
            border: 0;
            background: transparent;
            color: #9fb0c0;
            font-size: 0.88rem;
            cursor: pointer;
        }

        .read-more:hover {
            color: #c0cfdb;
        }

        .empty {
            padding: 18px 18px;
            text-align: center;
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.018);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--muted);
            box-shadow: none;
        }

        .empty-icon {
            display: inline-flex;
            width: 24px;
            height: 24px;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            border-radius: 999px;
            border: 1px solid rgba(137, 184, 154, 0.12);
            background: rgba(137, 184, 154, 0.05);
            color: #8ea596;
            position: relative;
        }

        .empty-icon::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: currentColor;
            opacity: 0.9;
            animation: pulse 1.8s ease-in-out infinite;
        }

        .empty-text {
            max-width: 420px;
            margin: 0 auto;
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(0.9);
                opacity: 0.65;
            }
            50% {
                transform: scale(1.15);
                opacity: 1;
            }
        }

        @media (max-width: 920px) {
            .toolbar {
                grid-template-columns: 1fr;
            }

            .actions {
                justify-content: flex-start;
            }
        }

        @media (max-width: 640px) {
            .shell {
                width: min(100vw - 20px, 1180px);
                padding-top: 24px;
            }

            .statusbar,
            .filters,
            .group-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .card-head {
                flex-direction: column;
            }

            .score-stack {
                justify-items: start;
            }

            .signal-tag {
                white-space: normal;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="hero">
            <p class="eyebrow">ET AI Hackathon 2026</p>
            <h1>Opportunity Radar</h1>
            <p class="subtext">A lightweight market intelligence dashboard for tracking conviction-ranked opportunities and AI-generated insight.</p>
        </section>

        <section class="toolbar">
            <div class="statusbar">
                <span id="signal-count">Loading signals...</span>
                <span id="last-updated">Waiting for first refresh</span>
            </div>

            <div class="filters">
                <label class="control-group">
                    <span class="control-label">Filter by stock</span>
                    <select id="stock-filter">
                        <option value="ALL">All stocks</option>
                    </select>
                </label>
                <label class="control-group">
                    <span class="control-label">Filter by signal type</span>
                    <select id="signal-filter">
                        <option value="ALL">All signal types</option>
                    </select>
                </label>
            </div>

            <div class="actions">
                <label class="toggle">
                    <input type="checkbox" id="auto-refresh" checked>
                    <span>Auto refresh</span>
                </label>
                <button class="refresh-btn" id="refresh-button" type="button">Refresh Now</button>
            </div>
        </section>

        <section class="filter-summary" id="filter-summary" aria-live="polite">
            <span>Showing:</span>
            <span class="filter-pill" id="stock-pill">Stock: All stocks</span>
            <span class="filter-pill" id="signal-pill">Signal Type: All signal types</span>
        </section>

        <section id="groups" class="groups" aria-live="polite"></section>
    </main>

    <script>
        const groupsContainer = document.getElementById("groups");
        const signalCount = document.getElementById("signal-count");
        const lastUpdated = document.getElementById("last-updated");
        const stockFilter = document.getElementById("stock-filter");
        const signalFilter = document.getElementById("signal-filter");
        const autoRefreshToggle = document.getElementById("auto-refresh");
        const refreshButton = document.getElementById("refresh-button");
        const stockPill = document.getElementById("stock-pill");
        const signalPill = document.getElementById("signal-pill");

        let allSignals = [];
        let refreshTimer = null;

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function getGroupName(score) {
            if (score >= 7) return "Strong";
            if (score >= 4) return "Moderate";
            return "Weak";
        }

        function normalizeSignal(signal) {
            const scoreValue = Number(
                signal.score ?? signal.conviction_score ?? signal.value ?? 0
            );

            return {
                symbol: String(signal.symbol ?? "UNKNOWN"),
                signal_types_combined: String(signal.signal_types_combined ?? ""),
                score: Number.isFinite(scoreValue) ? scoreValue : 0,
                strength: getGroupName(Number.isFinite(scoreValue) ? scoreValue : 0),
                date: String(signal.date ?? ""),
                explanation: String(signal.explanation ?? ""),
            };
        }

        function getSignalTags(signalTypesCombined) {
            return signalTypesCombined.split(" + ").map(item => item.trim()).filter(Boolean);
        }

        function getGroupMeta(groupName) {
            if (groupName === "Strong") {
                return { subtitle: "Highest conviction opportunities with strongest alignment" };
            }
            if (groupName === "Moderate") {
                return { subtitle: "Meaningful signals worth monitoring for confirmation" };
            }
            return { subtitle: "Early or isolated signals with lower confidence" };
        }

        function getTopSignal(signals) {
            if (!signals.length) {
                return null;
            }

            return sortSignals(signals)[0];
        }

        function updateFilterSummary() {
            stockPill.textContent = `Stock: ${stockFilter.value === "ALL" ? "All stocks" : stockFilter.value}`;
            signalPill.textContent = `Signal Type: ${signalFilter.value === "ALL" ? "All signal types" : signalFilter.value}`;
        }

        function populateFilters(signals) {
            const selectedStock = stockFilter.value;
            const selectedSignal = signalFilter.value;

            const stocks = [...new Set(signals.map(signal => signal.symbol))].sort();
            const signalTypes = [...new Set(signals.flatMap(signal => getSignalTags(signal.signal_types_combined)))].sort();

            stockFilter.innerHTML = '<option value="ALL">All stocks</option>' +
                stocks.map(stock => `<option value="${escapeHtml(stock)}">${escapeHtml(stock)}</option>`).join("");
            signalFilter.innerHTML = '<option value="ALL">All signal types</option>' +
                signalTypes.map(type => `<option value="${escapeHtml(type)}">${escapeHtml(type)}</option>`).join("");

            stockFilter.value = stocks.includes(selectedStock) ? selectedStock : "ALL";
            signalFilter.value = signalTypes.includes(selectedSignal) ? selectedSignal : "ALL";
            updateFilterSummary();
        }

        function applyFilters(signals) {
            return signals.filter(signal => {
                const stockValue = stockFilter.value || "ALL";
                const signalValue = signalFilter.value || "ALL";
                const stockMatch = stockValue === "ALL" || signal.symbol === stockValue;
                const signalMatch = signalValue === "ALL" || getSignalTags(signal.signal_types_combined).includes(signalValue);
                return stockMatch && signalMatch;
            });
        }

        function sortSignals(signals) {
            return [...signals].sort((a, b) => {
                if (b.score !== a.score) {
                    return b.score - a.score;
                }
                if (b.date !== a.date) {
                    return b.date.localeCompare(a.date);
                }
                return a.symbol.localeCompare(b.symbol);
            });
        }

        function renderSignals() {
            const filteredSignals = sortSignals(applyFilters(allSignals));
            const topSignal = getTopSignal(filteredSignals);
            updateFilterSummary();

            signalCount.textContent = `${filteredSignals.length} visible signal${filteredSignals.length === 1 ? "" : "s"}`;

            const grouped = {
                Strong: filteredSignals.filter(signal => getGroupName(signal.score) === "Strong"),
                Moderate: filteredSignals.filter(signal => getGroupName(signal.score) === "Moderate"),
                Weak: filteredSignals.filter(signal => getGroupName(signal.score) === "Weak")
            };

            const sections = Object.entries(grouped)
                .map(([groupName, signals]) => {
                    const meta = getGroupMeta(groupName);
                    return `
                    <section class="group">
                        <div class="group-header">
                            <div>
                                <h2 class="group-title">${groupName} Signals</h2>
                                <div class="group-subtitle">${meta.subtitle}</div>
                            </div>
                            <span class="group-count">${signals.length} signal${signals.length === 1 ? "" : "s"}</span>
                        </div>
                        ${signals.length
                            ? `<div class="card-grid">
                                ${signals.map((signal, index) => renderCard(signal, index, topSignal)).join("")}
                              </div>`
                            : `<div class="empty">
                                <div class="empty-icon" aria-hidden="true"></div>
                                <div class="empty-text">No strong signals right now. Monitoring for high-conviction opportunities.</div>
                              </div>`}
                    </section>
                `;
                });

            groupsContainer.innerHTML = sections.join("");
            bindReadMoreButtons();
        }

        function renderSignalTags(signalTypesCombined) {
            return getSignalTags(signalTypesCombined).map(tag => {
                const isZscore = tag.includes("zscore");
                const icon = isZscore ? "•" : "↗";
                return `<span class="signal-tag ${isZscore ? "zscore" : ""}">${icon} ${escapeHtml(tag)}</span>`;
            }).join("");
        }

        function renderCard(signal, index, topSignal) {
            const groupClass = getGroupName(signal.score).toLowerCase();
            const hasZscore = signal.signal_types_combined.includes("zscore_anomaly");
            const isTopSignal = topSignal &&
                signal.symbol === topSignal.symbol &&
                signal.score === topSignal.score &&
                signal.date === topSignal.date &&
                signal.signal_types_combined === topSignal.signal_types_combined;

            return `
                <article class="card ${groupClass} ${hasZscore ? "has-zscore" : ""} ${isTopSignal ? "top-signal" : ""}" style="animation-delay: ${index * 50}ms">
                    <div class="card-head">
                        <div class="card-head-left">
                            <h3 class="stock">${escapeHtml(signal.symbol)}</h3>
                            <div class="card-badges">
                                ${isTopSignal ? '<span class="badge top">Top Signal</span>' : ''}
                                ${hasZscore ? '<span class="badge">Anomaly</span>' : ''}
                            </div>
                        </div>
                        <div class="score-stack">
                            <div class="score-chip ${groupClass}">${escapeHtml(signal.strength)}</div>
                            <div class="score-value">${escapeHtml(signal.score)}/10</div>
                        </div>
                    </div>
                    <div class="meta">
                        <div class="meta-row">
                            <div class="meta-label">What happened</div>
                            <div class="meta-value what-happened">${renderSignalTags(signal.signal_types_combined)}</div>
                        </div>
                        <div class="meta-row">
                            <div class="meta-label">Confidence</div>
                            <div class="meta-value">${escapeHtml(signal.strength)} confidence with conviction score ${escapeHtml(signal.score)}/10</div>
                        </div>
                        <div class="meta-row">
                            <div class="meta-label">Date</div>
                            <div class="meta-value">${escapeHtml(signal.date)}</div>
                        </div>
                    </div>
                    <div class="divider"></div>
                    <div class="insight-label">• Insight</div>
                    <p class="explanation">${escapeHtml(signal.explanation)}</p>
                    <button class="read-more" type="button">Read more</button>
                </article>
            `;
        }

        function bindReadMoreButtons() {
            document.querySelectorAll(".read-more").forEach(button => {
                button.addEventListener("click", () => {
                    const card = button.closest(".card");
                    const expanded = card.classList.toggle("expanded");
                    button.textContent = expanded ? "Show less" : "Read more";
                });
            });
        }

        function updateRefreshTimer() {
            if (refreshTimer) {
                clearInterval(refreshTimer);
                refreshTimer = null;
            }

            if (autoRefreshToggle.checked) {
                refreshTimer = setInterval(fetchSignals, 15000);
            }
        }

        async function fetchSignals() {
            refreshButton.disabled = true;
            try {
                const response = await fetch("/api/signals", { cache: "no-store" });
                if (!response.ok) {
                    throw new Error(`Request failed with status ${response.status}`);
                }

                const data = await response.json();
                const signals = Array.isArray(data.signals) ? data.signals.map(normalizeSignal) : [];
                console.log("Signals received:", signals.length);
                allSignals = signals;
                populateFilters(allSignals);
                renderSignals();
                lastUpdated.textContent = `Last updated ${new Date().toLocaleTimeString()}`;
            } catch (error) {
                groupsContainer.innerHTML = `<div class="empty"><div class="empty-icon" aria-hidden="true"></div><div class="empty-text">${escapeHtml(error.message)}</div></div>`;
                signalCount.textContent = "Signal feed unavailable";
                lastUpdated.textContent = "Waiting for next refresh";
            } finally {
                refreshButton.disabled = false;
            }
        }

        stockFilter.addEventListener("change", renderSignals);
        signalFilter.addEventListener("change", renderSignals);
        autoRefreshToggle.addEventListener("change", updateRefreshTimer);
        refreshButton.addEventListener("click", fetchSignals);

        fetchSignals();
        updateRefreshTimer();
    </script>
</body>
</html>
